<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Misi AR - Detektif Kerusakan Hardware</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    
    <script src="assets/js/audio-manager.js"></script>
    <script src="assets/js/quiz.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght=600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #3B82F6;
            --neon-cyan: #22D3EE;
            --neon-red: #ef4444;
            --dark-glass: rgba(15, 23, 42, 0.85);
        }

        /* Loader Layar Penuh AR.js */
        .arjs-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #020617;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-family: 'Quicksand', sans-serif;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #1e293b;
            border-top: 5px solid var(--neon-cyan);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Elemen UI Game */
        .game-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            font-family: 'Quicksand', sans-serif;
        }
        .interactive-el {
            pointer-events: auto;
        }
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
        }
        .btn-back {
            background: var(--dark-glass);
            border: 2px solid rgba(34, 211, 238, 0.3);
            color: white;
            padding: 10px 18px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(5px);
            transition: all 0.2s;
        }
        .btn-back:hover {
            background: var(--neon-cyan);
            color: #020617;
            box-shadow: 0 0 15px var(--neon-cyan);
        }
        .status-box {
            background: var(--dark-glass);
            border: 2px solid rgba(34, 211, 238, 0.3);
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            font-weight: 800;
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .hearts-container {
            color: var(--neon-red);
            display: flex;
            gap: 4px;
            font-size: 18px;
        }

        /* Bidikan Kamera (Scan Target Guide) */
        .scan-aim {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 260px;
            height: 340px;
            border: 3px dashed rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
        }
        .scan-aim i {
            font-size: 40px;
            color: var(--neon-cyan);
            margin-bottom: 15px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.6; }
        }

        /* Jendela Pop-up Kotak Kasus/Soal Kuis */
        .quiz-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            width: 90%;
            max-width: 480px;
            background: rgba(10, 15, 30, 0.95);
            border: 3px solid var(--neon-cyan);
            box-shadow: 0 0 30px rgba(34, 211, 238, 0.3);
            border-radius: 24px;
            padding: 25px;
            z-index: 100;
            color: white;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
        }
        .quiz-panel.active {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            visibility: visible;
        }
        .quiz-header {
            text-align: center;
            border-bottom: 2px solid rgba(34, 211, 238, 0.2);
            padding-bottom: 12px;
            margin-bottom: 15px;
        }
        .quiz-header h3 {
            margin: 0;
            color: var(--neon-cyan);
            font-family: 'Fredoka One', sans-serif;
            font-size: 22px;
            letter-spacing: 1px;
        }
        .case-box {
            background: rgba(30, 41, 59, 0.6);
            border-left: 4px solid #f59e0b;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 20px;
            color: #cbd5e1;
        }
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option-btn {
            background: rgba(30, 41, 59, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px;
            color: white;
            text-align: left;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .option-btn:hover {
            border-color: var(--neon-cyan);
            background: rgba(34, 211, 238, 0.1);
            transform: translateX(4px);
        }

        /* Bilangan Bar Sisa Waktu (Timer) */
        .timer-bar-container {
            width: 100%;
            height: 6px;
            background: #1e293b;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 15px;
        }
        .timer-bar-fill {
            width: 100%;
            height: 100%;
            background: var(--neon-cyan);
            transition: width 0.1s linear;
        }
        .hidden { display: none !important; }
    </style>
</head>

<body style="margin: 0px; overflow: hidden; background-color: #020617;">

    <div class="arjs-loader">
        <div style="text-align: center;">
            <div class="spinner"></div>
            <div id="loader-text">Menghubungkan Kamera & Berkas Diagnosis Kuis...</div>
        </div>
    </div>

    <div class="game-overlay">
        <div class="top-bar">
            <a href="index.html" class="btn-back interactive-el" id="back-btn">
                <i class="fa-solid fa-arrow-left"></i> Menu Utama
            </a>
            <div class="status-box">
                <div><i class="fa-solid fa-laptop-medical" style="color:#22d3ee; margin-right:4px;"></i> Kasus: <span id="solved-count">0</span>/11</div>
                <div class="hearts-container" id="hearts-box">
                    <i class="fa-solid fa-heart"></i>
                    <i class="fa-solid fa-heart"></i>
                    <i class="fa-solid fa-heart"></i>
                </div>
            </div>
        </div>

        <div class="scan-aim" id="aim-guide">
            <i class="fa-solid fa-qrcode"></i>
            <div style="font-weight:700; font-size:14px; letter-spacing:0.5px;">MISI DETEKTIF PC</div>
            <div style="font-size:11px; color:#94a3b8; margin-top:5px; padding:0 10px;">Scan kartu alat untuk mendiagnosis laporan kasus kerusakan!</div>
        </div>
    </div>

    <div class="quiz-panel" id="quiz-container">
        <div class="quiz-header">
            <h3 id="quiz-title">LAPORAN KERUSAKAN</h3>
        </div>
        <div class="case-box" id="case-question">
            Memuat data gejala klinis komputer...
        </div>
        <div class="options-list">
            <button class="option-btn" data-ans="A"><span>A.</span> <span id="opt-A">Pilihan A</span></button>
            <button class="option-btn" data-ans="B"><span>B.</span> <span id="opt-B">Pilihan B</span></button>
            <button class="option-btn" data-ans="C"><span>C.</span> <span id="opt-C">Pilihan C</span></button>
            <button class="option-btn" data-ans="D"><span>D.</span> <span id="opt-D">Pilihan D</span></button>
        </div>
        <div class="timer-bar-container">
            <div class="timer-bar-fill" id="timer-indicator"></div>
        </div>
    </div>

    <a-scene 
        vr-mode-ui="enabled: false;"
        renderer="antialias: false; precision: low; powerPreference: high-performance;"
        embedded 
        arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;">

        <a-entity camera id="mainCamera"></a-entity>

        <a-nft type="nft" url="assets/marker/motherboard/motherboard" data-component="motherboard"></a-nft>
        <a-nft type="nft" url="assets/marker/processor/processor" data-component="processor"></a-nft>
        <a-nft type="nft" url="assets/marker/harddisk/harddisk" data-component="harddisk"></a-nft>
        <a-nft type="nft" url="assets/marker/ram/ram" data-component="ram"></a-nft>
        <a-nft type="nft" url="assets/marker/gpu/gpu" data-component="gpu"></a-nft>
        <a-nft type="nft" url="assets/marker/psu/psu" data-component="psu"></a-nft>
        <a-nft type="nft" url="assets/marker/monitor/monitor" data-component="monitor"></a-nft>
        <a-nft type="nft" url="assets/marker/keyboard/keyboard" data-component="keyboard"></a-nft>
        <a-nft type="nft" url="assets/marker/mouse/mouse" data-component="mouse"></a-nft>
        <a-nft type="nft" url="assets/marker/printer/printer" data-component="printer"></a-nft>
        <a-nft type="nft" url="assets/marker/speaker/speaker" data-component="speaker"></a-nft>

    </a-scene>

    <script>
        // Memaksa browser meminta izin webcam secara eksplisit
        window.addEventListener('load', () => {
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                .then((stream) => { console.log("Sensor kamera kuis aktif."); })
                .catch((err) => {
                    console.error(err);
                    document.getElementById('loader-text').innerHTML = "<span style='color:#ef4444; font-weight:bold;'>Kamera Diblokir!</span><br><small>Buka gembok URL atas, berikan izin kamera lalu refresh.</small>";
                });
            }
        });

        // Menghilangkan loading screen saat AR.js siap
        window.addEventListener('arjs-nft-loaded', () => {
            const loader = document.querySelector('.arjs-loader');
            if (loader) loader.style.display = 'none';
        });

        // Menghubungkan Event Scan Marker dengan Logika Quiz.js Anda
        document.addEventListener('DOMContentLoaded', () => {
            const nftMarkers = document.querySelectorAll('a-nft');
            nftMarkers.forEach(marker => {
                marker.addEventListener('markerFound', () => {
                    const name = marker.getAttribute('data-component');
                    
                    // Efek visual kilatan hijau penanda marker terkunci
                    document.body.style.boxShadow = "inset 0 0 50px #22c55e"; 
                    setTimeout(() => document.body.style.boxShadow = "none", 500);
                    
                    // Memanggil fungsi utama pembuat kuis dari berkas assets/js/quiz.js Anda
                    if (typeof startQuiz === 'function') {
                        startQuiz(name);
                    }
                });
            });
        });

        // =========================================================================
        // AUTOMATIC OPTIMIZATION: PAUSE AR ENGINE AGAR GAME KUIS TIDAK PATAH-PATAH
        // =========================================================================
        const quizBox = document.getElementById('quiz-container');
        const observer = new MutationObserver((mutations) => {
            mutations.forEach((mutation) => {
                if (mutation.attributeName === 'id' || mutation.type === 'attributes') {
                    const isVisible = quizBox.classList.contains('active') || !quizBox.classList.contains('hidden');
                    const scene = document.querySelector('a-scene');
                    if (isVisible && scene) {
                        console.log("Kuis aktif. Menjeda kerja kamera agar RAM lancar...");
                        scene.pause(); // Kamera diam sejenak agar siswa lancar menjawab kuis
                    }
                }
            });
        });
        if (quizBox) { observer.observe(quizBox, { attributes: true, childList: false, subtree: false }); }

        // Fungsi pembantu untuk menghidupkan kembali kamera (Dipanggil dari quiz.js Anda saat soal ditutup)
        function resumeARCamera() {
            const scene = document.querySelector('a-scene');
            if (scene) {
                console.log("Menyalakan kembali pelacak kamera AR...");
                scene.play();
            }
        }

        // Mematikan aliran video agar RAM bersih total saat keluar halaman kuis
        document.getElementById('back-btn').addEventListener('click', (e) => {
            e.preventDefault();
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({video: true}).then(stream => {
                    stream.getTracks().forEach(track => track.stop());
                }).catch(err => console.log(err));
            }
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
