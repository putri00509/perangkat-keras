<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Misi AR - Kuis Interaktif Hardware</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    
    <script src="assets/js/audio-manager.js"></script>
    <script src="assets/js/quiz.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #3B82F6;
            --neon-cyan: #22D3EE;
            --neon-red: #ef4444;
            --dark-glass: rgba(15, 23, 42, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            background-color: #020617;
            width: 100vw;
            height: 100vh;
        }

        /* Tampilan Loader Ringan & Keren */
        .arjs-loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            z-index: 9999; display: flex; justify-content: center; align-items: center;
            color: white; flex-direction: column; transition: opacity 0.4s ease;
        }
        .spinner {
            width: 50px; height: 50px; border: 5px solid rgba(34, 211, 238, 0.1);
            border-top: 5px solid var(--neon-cyan); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* UI Kontrol Atas */
        .top-ui {
            position: absolute; top: 20px; left: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 20px; z-index: 10; pointer-events: none;
        }
        .btn-action {
            padding: 12px 20px; background: var(--dark-glass);
            border: 2px solid rgba(255, 255, 255, 0.1); border-radius: 50px;
            color: white; font-weight: bold; text-decoration: none;
            display: inline-flex; align-items: center; gap: 8px;
            pointer-events: auto; backdrop-filter: blur(10px); transition: 0.3s;
        }
        .btn-action:hover { border-color: var(--neon-cyan); box-shadow: 0 0 15px rgba(34, 211, 238, 0.4); }

        /* Panel Instruksi Bawah */
        .mission-box {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 500px; background: var(--dark-glass);
            border: 2px solid var(--primary); border-radius: 20px;
            padding: 20px; text-align: center; color: white;
            z-index: 10; backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .mission-box h2 { font-family: 'Fredoka One', cursive; color: var(--neon-cyan); margin-bottom: 5px; font-size: 1.3rem; }
    </style>
</head>
<body>

    <div class="arjs-loader" id="main-loader">
        <div class="spinner"></div>
        <p style="font-family: 'Fredoka One', cursive; font-size: 1.4rem; letter-spacing: 1px;">MENGAKTIFKAN LOGIKA KUIS...</p>
        <p style="color: #94a3b8; font-size: 0.9rem; margin-top: 5px;">Mempersiapkan area render kamera...</p>
    </div>

    <div class="top-ui">
        <a href="index.html" class="btn-action"><i class="fa-solid fa-house"></i> Menu Utama</a>
        <div class="btn-action" style="color: var(--neon-cyan);"><i class="fa-solid fa-gamepad"></i> Kuis Interaktif</div>
    </div>

    <div class="mission-box" id="instruction-panel">
        <h2>MISI KUIS AR AKTIF</h2>
        <p id="target-instruction">Silakan tunggu, sistem sedang memetakan soal kuis...</p>
    </div>

    <div id="quiz-container" class="hidden"></div>

    <a-scene 
        vr-mode-ui="enabled: false;" 
        renderer="logarithmicDepthBuffer: true; precision: medium; antialias: false;" 
        embedded 
        arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;">
        
        <a-entity id="active-marker-holder"></a-entity>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const markerHolder = document.getElementById('active-marker-holder');
        const instructionText = document.getElementById('target-instruction');

        // Fungsi Global untuk Menyuntikkan Target Gambar Secara Dinamis (On-Demand)
        function muatTargetMarkerKuis(idKomponen) {
            // Bersihkan marker lama agar RAM kosong total
            markerHolder.innerHTML = "";
            
            // Perbarui instruksi teks di layar
            instructionText.innerText = `Cari kartu gambar [ ${idKomponen.toUpperCase()} ] lalu arahkan kameramu!`;

            // Buat elemen pelacakan baru secara runtime
            const nftElement = document.createElement('a-nft');
            nftElement.setAttribute('type', 'nft');
            nftElement.setAttribute('url', `assets/marker/${idKomponen}/${idKomponen}`);
            nftElement.setAttribute('data-component', idKomponen);
            
            // LAZY LOADING MODEL: Mengunduh file model .glb HANYA ketika marker komponen ini aktif dibutuhkan
            nftElement.innerHTML = `
                <a-entity class="ar-model" gltf-model="url(assets/model/${idKomponen}.glb)" scale="20 20 20" position="50 0 -100" rotation="-90 0 0"></a-entity>
            `;

            // Event saat target kartu berhasil dideteksi kamera
            nftElement.addEventListener('markerFound', () => {
                document.body.style.boxShadow = "inset 0 0 40px #22c55e";
                setTimeout(() => document.body.style.boxShadow = "none", 600);
                
                // Panggil fungsi pembuka kuis di quiz.js Anda
                if (typeof startQuiz === 'function') {
                    startQuiz(idKomponen);
                }
            });

            markerHolder.appendChild(nftElement);
        }

        // Pemicu Awal: Sistem siap melacak kartu pertama (Misal: motherboard)
        window.addEventListener('load', () => {
            setTimeout(() => {
                muatTargetMarkerKuis('motherboard');
            }, 500);
        });

        // Hilangkan tab loader seketika aliran kamera web telah aktif
        window.addEventListener('arjs-video-initialized', () => {
            const loader = document.getElementById('main-loader');
            if(loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 400);
            }
        });
    </script>
</body>
</html>
