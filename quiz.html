<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>Misi AR - Kuis Interaktif Hardware</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    
    <script src="assets/js/audio-manager.js"></script>
    <script src="assets/js/quiz.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #3B82F6;
            --neon-cyan: #22D3EE;
            --neon-red: #ef4444;
            --dark-glass: rgba(15, 23, 42, 0.85);
        }

        /* CSS Loader AR.js */
        .arjs-loader {
            height: 100%;
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            background-color: #020617;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Quicksand', sans-serif;
        }

        .arjs-loader div {
            text-align: center;
            font-size: 1.3rem;
            color: white;
            font-weight: 800;
        }

        /* Widget Status Misi di Pojok Kanan Atas Layar */
        .mission-status-widget {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999;
            background: var(--dark-glass);
            backdrop-filter: blur(10px);
            border: 2px solid var(--neon-cyan);
            border-radius: 20px;
            padding: 10px 18px;
            font-family: 'Quicksand', sans-serif;
            color: white;
            font-weight: 800;
            font-size: 0.9rem;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Container Hamparan Kuis */
        #quiz-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 6, 23, 0.7); 
            backdrop-filter: blur(6px); 
            -webkit-backdrop-filter: blur(6px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            padding: 20px;
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        /* Modal Kuis Bergaya Game Cyberpunk */
        .quiz-modal {
            background: var(--dark-glass);
            border: 3px solid var(--primary);
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.5);
            padding: 30px;
            border-radius: 28px; 
            width: 100%;
            max-width: 480px;
            text-align: center;
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .game-meta-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .hearts-container {
            color: var(--neon-red);
            font-size: 1.2rem;
            display: flex;
            gap: 4px;
        }

        .timer-bar-container {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-bottom: 20px;
            overflow: hidden;
        }

        .timer-bar-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, var(--neon-cyan), var(--primary));
            transition: width 1s linear;
        }

        #quiz-title {
            color: white;
            font-family: 'Fredoka One', cursive;
            margin-bottom: 15px;
            font-size: 1.8rem;
            letter-spacing: 1px;
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        #question-text {
            font-size: 1.15rem;
            color: #e2e8f0;
            line-height: 1.6;
            margin-bottom: 25px;
            font-weight: 600;
        }

        .quiz-btn {
            display: block;
            width: 100%;
            margin: 14px 0;
            padding: 16px 20px;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.04);
            border: 2px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            color: #cbd5e1;
            font-size: 1.05rem;
            font-weight: 800;
            text-align: left; 
            transition: all 0.25s ease;
        }

        .quiz-btn:hover {
            background: rgba(34, 211, 238, 0.15);
            border-color: var(--neon-cyan);
            color: white;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.3);
            transform: translateY(-2px); 
        }

        #quiz-result h3 {
            font-family: 'Fredoka One', cursive;
            font-size: 2.2rem;
            color: white;
            margin-bottom: 10px;
            text-shadow: 0 0 15px #22c55e;
        }

        #score-text {
            font-size: 1.3rem;
            font-weight: 800;
            color: #cbd5e1;
            margin-bottom: 25px;
        }

        #close-quiz-btn {
            padding: 14px 35px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            font-weight: 800;
            font-size: 1rem;
            background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
            transition: 0.2s;
        }

        .feedback-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.95);
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .feedback-correct {
            border: 4px solid #22c55e;
            box-shadow: inset 0 0 30px rgba(34, 197, 94, 0.4);
        }
        .feedback-correct h4 {
            color: #22c55e;
            font-family: 'Fredoka One', cursive;
            font-size: 1.8rem;
            margin-top: 10px;
        }

        .feedback-wrong {
            border: 4px solid #ef4444;
            box-shadow: inset 0 0 30px rgba(239, 68, 68, 0.4);
            animation: shake 0.4s ease-in-out;
        }
        .feedback-wrong h4 {
            color: #ef4444;
            font-family: 'Fredoka One', cursive;
            font-size: 1.8rem;
            margin-top: 10px;
        }

        .emoji-glow {
            font-size: 4.5rem;
            animation: bounce 0.6s infinite alternate;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-8px); } 40%, 80% { transform: translateX(8px); } }
        .hidden { display: none !important; }
    </style>
</head>
<body style="margin : 0px; overflow: hidden; background-color: #020617;">
    
    <div class="arjs-loader">
        <div><i class="fa-solid fa-circle-notch fa-spin"></i> Memuat Berkas Diagnosis Kuis...</div>
    </div>

    <div class="mission-status-widget">
        <i class="fa-solid fa-list-check" style="color: var(--neon-cyan);"></i>
        <span>Misi Selesai: <span id="solved-count">0</span> / 11</span>
    </div>

    <div id="quiz-container" class="hidden">
        <div class="quiz-modal">
            <div class="game-meta-wrapper">
                <div class="hearts-container" id="hearts-box">
                    <i class="fa-solid fa-heart"></i><i class="fa-solid fa-heart"></i><i class="fa-solid fa-heart"></i>
                </div>
                <div style="color: #94a3b8; font-weight: 800; font-size: 0.85rem;">
                    <i class="fa-solid fa-clock"></i> WAKTU MISI
                </div>
            </div>
            <div class="timer-bar-container">
                <div class="timer-bar-fill" id="timer-bar"></div>
            </div>
            <h2 id="quiz-title">LAPORAN KERUSAKAN</h2>
            <div id="question-area">
                <p id="question-text">Memuat analisis kasus komputer...</p>
                <div id="options-container"></div>
            </div>
            <div id="quiz-result" class="hidden">
                <h3>MISI SELESAI</h3>
                <p id="score-text">Skor Anda diperoleh di sini.</p>
                <button id="close-quiz-btn">Amankan Data</button>
            </div>
        </div>
    </div>

    <a-scene vr-mode-ui="enabled: false;" renderer="antialias: false; precision: low;" embedded arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;">    
        <a-nft type="nft" url="assets/marker/motherboard/motherboard" data-component="motherboard"></a-nft>
        <a-nft type="nft" url="assets/marker/gpu/gpu" data-component="gpu"></a-nft>
        <a-nft type="nft" url="assets/marker/harddisk/harddisk" data-component="harddisk"></a-nft>
        <a-nft type="nft" url="assets/marker/monitor/monitor" data-component="monitor"></a-nft>
        <a-nft type="nft" url="assets/marker/processor/processor" data-component="processor"></a-nft>
        <a-nft type="nft" url="assets/marker/psu/psu" data-component="psu"></a-nft>
        <a-nft type="nft" url="assets/marker/ram/ram" data-component="ram"></a-nft>
        <a-nft type="nft" url="assets/marker/keyboard/keyboard" data-component="keyboard"></a-nft>
        <a-nft type="nft" url="assets/marker/mouse/mouse" data-component="mouse"></a-nft>
        <a-nft type="nft" url="assets/marker/printer/printer" data-component="printer"></a-nft>
        <a-nft type="nft" url="assets/marker/speaker/speaker" data-component="speaker"></a-nft>

        <a-entity camera></a-entity>
    </a-scene>
    
    <script>
        // 1. Injeksi Tombol Keluar
        const backButton = document.createElement('a');
        backButton.href = 'index.html';
        backButton.innerHTML = '<i class="fa-solid fa-compass"></i> Keluar Misi';
        backButton.setAttribute('style', `position: fixed; top: 20px; left: 20px; z-index: 10000; display: flex; align-items: center; gap: 8px; padding: 12px 22px; background: rgba(15, 23, 42, 0.85); color: #ffffff; text-decoration: none; font-family: 'Quicksand', sans-serif; font-size: 15px; font-weight: 800; border-radius: 50px; border: 2px solid #22d3ee; box-shadow: 0 0 15px rgba(34,211,238,0.4);`);
        document.body.appendChild(backButton);

        // 2. Logika Menghilangkan Loader Otomatis
        window.addEventListener('arjs-nft-loaded', () => {
            const loader = document.querySelector('.arjs-loader');
            if (loader) loader.style.display = 'none';
        });

        // 3. Sensor Penemu Kartu
        window.addEventListener('load', () => {
            const markers = document.querySelectorAll('a-nft');
            markers.forEach(marker => {
                marker.addEventListener('markerFound', () => {
                    const url = marker.getAttribute('url');
                    const name = url ? url.split('/').pop() : "Unknown";
                    document.body.style.boxShadow = "inset 0 0 40px #22c55e"; 
                    setTimeout(() => document.body.style.boxShadow = "none", 600);
                    
                    if (typeof startQuiz === 'function') {
                        startQuiz(name);
                    }
                });
            });
        });

        // 4. Optimasi RAM
        const quizContainer = document.getElementById('quiz-container');
        const observer = new MutationObserver(() => {
            if (!quizContainer.classList.contains('hidden')) {
                const sceneEl = document.querySelector('a-scene');
                if (sceneEl) sceneEl.pause();
            }
        });
        if (quizContainer) observer.observe(quizContainer, { attributes: true });

        const closeQuizBtn = document.getElementById('close-quiz-btn');
        if (closeQuizBtn) {
            closeQuizBtn.addEventListener('click', () => {
                const sceneEl = document.querySelector('a-scene');
                if (sceneEl) sceneEl.play();
            });
        }
    </script>
</body>
</html>
