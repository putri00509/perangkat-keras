<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petualangan AR Seru!</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
<style>
:root{
    --primary:#3B82F6;
    --secondary:#22D3EE;
    --purple:#8B5CF6;
    --dark:#020617;
    --dark2:#0F172A;
    --light:#F8FAFC;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Quicksand',sans-serif;
    min-height:100vh;

    background:
    radial-gradient(circle at top,
    #1E3A8A 0%,
    #0F172A 40%,
    #020617 100%);

    display:flex;
    justify-content:center;
    align-items:center;

    overflow-x:hidden;
    position:relative;
}

/* Bintang */

body::before{
    content:"";
    position:fixed;
    inset:0;

    background-image:
    radial-gradient(white 1px, transparent 1px);

    background-size:45px 45px;

    opacity:.15;
    animation:twinkle 5s infinite alternate;
    pointer-events:none;
}

@keyframes twinkle{
    from{opacity:.1;}
    to{opacity:.3;}
}

/* Container */

.container{
    text-align:center;
    width:100%;
    max-width:1200px;
    padding:30px 20px;
}

/* Judul */

h1{
    font-family:'Fredoka One',cursive;
    color:white;

    font-size:4rem;

    text-shadow:
    0 0 10px #22D3EE,
    0 0 20px #22D3EE,
    0 0 40px #3B82F6;

    animation:floatTitle 3s ease-in-out infinite;
}

@keyframes floatTitle{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-8px);
    }
}

.subtitle{
    margin-top:15px;
    margin-bottom:50px;

    color:#E2E8F0;

    font-size:1.3rem;
    font-weight:700;
}

/* Wrapper */

.menu-wrapper{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
}

/* Card */

.card{
    width:300px;

    padding:35px 25px;

    text-decoration:none;

    background:rgba(15,23,42,.8);

    backdrop-filter:blur(15px);

    border-radius:30px;

    border:2px solid rgba(255,255,255,.1);

    transition:.4s;

    position:relative;

    overflow:hidden;
}

/* Efek Glow */

.card::before{
    content:"";

    position:absolute;
    top:-50%;
    left:-50%;

    width:200%;
    height:200%;
    background:
    linear-gradient(
    45deg,
    transparent,
    rgba(255,255,255,.15),
    transparent);

    transform:rotate(25deg);

    transition:.5s;
}

.card:hover::before{
    left:100%;
}

.card:hover{
    transform:
    translateY(-12px)
    scale(1.05);

    box-shadow:
    0 0 20px rgba(34,211,238,.5),
    0 0 50px rgba(59,130,246,.4);
}

/* Icon */

.icon-circle{
    width:110px;
    height:110px;

    margin:auto;
    margin-bottom:25px;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:3rem;

    background:
    rgba(255,255,255,.08);

    border:
    2px solid rgba(255,255,255,.15);

    box-shadow:
    0 0 25px rgba(34,211,238,.4);
}

.card h2{
    color:white;
    font-size:1.8rem;
    margin-bottom:10px;
    font-family:'Fredoka One',cursive;
}

.card p{
    color:#CBD5E1;
    font-size:1rem;
    line-height:1.6;
}

/* BELAJAR */

.card-learn{
    border-color:#22D3EE;
}

.card-learn .icon-circle{
    box-shadow:
    0 0 20px #22D3EE;
}

.card-learn i{
    color:#22D3EE;
}

/* QUIZ */

.card-quiz{
    border-color:#3B82F6;
}

.card-quiz .icon-circle{
    box-shadow:
    0 0 20px #3B82F6;
}

.card-quiz i{
    color:#3B82F6;
}

/* MARKER */

.card-marker{
    border-color:#8B5CF6;
}

.card-marker .icon-circle{
    box-shadow:
    0 0 20px #8B5CF6;
}

.card-marker i{
    color:#8B5CF6;
}

/* Tombol Glow */

.card:hover h2{
    text-shadow:
    0 0 10px white,
    0 0 20px currentColor;
}

/* Dekorasi */

.decoration{
    position:fixed;
    z-index:-1;
    opacity:.4;
}

/* Responsive Tablet */

@media(max-width:768px){

    h1{
        font-size:3rem;
    }

    .subtitle{
        font-size:1.1rem;
    }

    .menu-wrapper{
        gap:20px;
    }

    .card{
        width:280px;
    }
}

/* Responsive HP */

@media(max-width:480px){

    .container{
        padding:20px;
    }

    h1{
        font-size:2.3rem;
    }

    .subtitle{
        font-size:1rem;
    }

    .card{
        width:100%;
        max-width:320px;
    }

    .icon-circle{
        width:90px;
        height:90px;
        font-size:2.5rem;
    }
}
</style>
</head>
<body>

    <i class="fa-solid fa-cloud decoration" style="top: 10%; left: 5%; font-size: 4rem; color: white;"></i>
    <i class="fa-solid fa-star decoration" style="top: 15%; right: 10%; font-size: 3rem; color: var(--accent-color);"></i>
    <i class="fa-solid fa-rocket decoration" style="bottom: 10%; left: 10%; font-size: 5rem; color: #ced4da; transform: rotate(-45deg);"></i>

    <div class="container">
        <h1>Halo, Petualang!</h1>
        <p class="subtitle">Pilih misimu hari ini!</p>

        <div class="menu-wrapper">
            <a href="ar.html" class="card card-learn">
                <div class="icon-circle">
                    <i class="fa-solid fa-book-open-reader"></i>
                </div>
                <h2>Belajar AR</h2>
                <p>Lihat benda ajaib muncul di duniamu!</p>
            </a>

            <a href="quiz.html" class="card card-quiz">
                <div class="icon-circle">
                    <i class="fa-solid fa-gamepad"></i>
                </div>
                <h2>Quiz Seru</h2>
                <p>Uji kemampuanmu dan kumpulkan bintang!</p>
            </a>

            <a href="marker.html" class="card card-marker">
                <div class="icon-circle">
                    <i class="fa-solid fa-qrcode"></i>
                </div>
                <h2>Lihat Marker</h2>
                <p>Buka daftar gambar untuk discan kameramu!</p>
            </a>
        </div>
    </div>

    <script>
        // Efek suara sederhana saat hover (Opsional)
        const cards = document.querySelectorAll('.card');
        cards.forEach(card => {
            card.addEventListener('mouseenter', () => {
                console.log('Tet-tot! Ayo belajar!');
            });
        });
    </script>
</body>
</html>
