<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Komponen Komputer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <style>
        /* Mengatur agar semua gambar memiliki tinggi yang seragam tanpa merusak rasio */
        .card-img-top {
            height: 200px;
            object-fit: cover;
        }
        /* Efek pointer untuk menandakan kartu bisa diklik */
        .card {
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .card:hover {
            transform: scale(1.03);
            box-shadow: 0 10px 20px rgba(0,0,0,0.15) !important;
        }
        /* Penyesuaian area tombol kembali agar rapi di mobile */
        .back-nav {
            position: absolute;
            top: 20px;
            left: 20px;
        }
        @media (max-width: 768px) {
            .back-nav {
                position: relative;
                top: 0;
                left: 0;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body class="bg-light">

    <div class="container-fluid pt-3 px-4 position-relative">
        <div class="back-nav">
            <a href="index.html" class="btn btn-white bg-white shadow-sm rounded-pill px-3 py-2 fw-semibold text-dark border d-inline-flex align-items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" class="bi bi-arrow-left" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8"/>
                </svg>
                Kembali ke Kuis AR
            </a>
        </div>
    </div>

    <div class="container my-5">
        <header class="text-center mb-5">
            <h1 class="fw-bold text-dark">Daftar Komponen Hardware</h1>
            <p class="text-muted">Klik pada gambar/kartu untuk memperbesar marker</p>
        </header>

        <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4">
            
            <div class="col">
                <div class="card h-100 shadow-sm" data-bs-toggle="modal" data-bs-target="#imageModal" data-src="marker/gpu.jpg" data-title="GPU">
                    <img src="marker/gpu.jpg" class="card-img-top" alt="GPU">
                    <div class="card-body text-center">
                        <h5 class="card-title text-capitalize">GPU</h5>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card h-100 shadow-sm" data-bs-toggle="modal" data-bs-target="#imageModal" data-src="marker/hardisk.jpg" data-title="Harddisk">
                    <img src="marker/harddisk.jpg" class="card-img-top" alt="Harddisk">
                    <div class="card-body text-center">
                        <h5 class="card-title text-capitalize">Harddisk</h5>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card h-100 shadow-sm" data-bs-toggle="modal" data-bs-target="#imageModal" data-src="marker/keyboard.jpg" data-title="Keyboard">
                    <img src="marker/keyboard.jpg" class="card-img-top" alt="Keyboard">
                    <div class="card-body text-center">
                        <h5 class="card-title text-capitalize">Keyboard</h5>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card h-100 shadow-sm" data-bs-toggle="modal" data-bs-target="#imageModal" data-src="marker/monitor.jpg" data-title="Monitor">
                    <img src="marker/monitor.jpg" class="card-img-top" alt="Monitor">
                    <div class="card-body text-center">
                        <h5 class="card-title text-capitalize">Monitor</h5>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card h-100 shadow-sm" data-bs-toggle="modal" data-bs-target="#imageModal" data-src="marker/motherboard.png" data-title="Motherboard">
                    <img src="marker/motherboard.png" class="card-img-top" alt="Motherboard">
                    <div class="card-body text-center">
                        <h5 class="card-title text-capitalize">Motherboard</h5>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card h-100 shadow-sm" data-bs-toggle="modal" data-bs-target="#imageModal" data-src="marker/mouse.jpg" data-title="Mouse">
                    <img src="marker/mouse.jpg" class="card-img-top" alt="Mouse">
                    <div class="card-body text-center">
                        <h5 class="card-title text-capitalize">Mouse</h5>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card h-100 shadow-sm" data-bs-toggle="modal" data-bs-target="#imageModal" data-src="marker/printer.jpg" data-title="Printer">
                    <img src="marker/printer.jpg" class="card-img-top" alt="Printer">
                    <div class="card-body text-center">
                        <h5 class="card-title text-capitalize">Printer</h5>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card h-100 shadow-sm" data-bs-toggle="modal" data-bs-target="#imageModal" data-src="marker/procesor.jpg" data-title="Procesor">
                    <img src="marker/processor.jpg" class="card-img-top" alt="Procesor">
                    <div class="card-body text-center">
                        <h5 class="card-title text-capitalize">Procesor</h5>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card h-100 shadow-sm" data-bs-toggle="modal" data-bs-target="#imageModal" data-src="marker/psu.jpg" data-title="PSU">
                    <img src="marker/psu.jpg" class="card-img-top" alt="PSU">
                    <div class="card-body text-center">
                        <h5 class="card-title text-upper">PSU</h5>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card h-100 shadow-sm" data-bs-toggle="modal" data-bs-target="#imageModal" data-src="marker/ram.jpg" data-title="RAM">
                    <img src="marker/ram.jpg" class="card-img-top" alt="RAM">
                    <div class="card-body text-center">
                        <h5 class="card-title text-upper">RAM</h5>
                    </div>
                </div>
            </div>

            <div class="col">
                <div class="card h-100 shadow-sm" data-bs-toggle="modal" data-bs-target="#imageModal" data-src="marker/speaker.jpg" data-title="Speaker">
                    <img src="marker/speaker.jpg" class="card-img-top" alt="Speaker">
                    <div class="card-body text-center">
                        <h5 class="card-title text-capitalize">Speaker</h5>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="modal fade" id="imageModal" tabindex="-1" aria-labelledby="imageModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-md">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold" id="imageModalLabel">Nama Komponen</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center bg-dark p-0">
                    <img src="" id="modalImage" class="img-fluid w-100" alt="Preview Gambar">
                </div>
                <div class="modal-footer justify-content-center">
                    <p class="text-muted small m-0">Arahkan kamera AR Anda ke gambar ini.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>

    <script>
        const imageModal = document.getElementById('imageModal');
        if (imageModal) {
            imageModal.addEventListener('show.bs.modal', event => {
                const card = event.relatedTarget;
                const imgSrc = card.getAttribute('data-src');
                const imgTitle = card.getAttribute('data-title');
                
                const modalTitle = imageModal.querySelector('.modal-title');
                const modalImg = imageModal.querySelector('#modalImage');
                
                modalTitle.textContent = imgTitle;
                modalImg.src = imgSrc;
            });
        }
    </script>
</body>
</html>
