<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Media Pembelajaran AR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
        .marker-guide { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 300px; border: 5px dashed #00E5FF; border-radius: 25px; z-index: 9998; pointer-events: none; }
        .marker-guide.detected { border-color: #22c55e; }
        .ar-popup { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 350px; background: rgba(0,0,0,0.9); color: white; padding: 20px; border-radius: 20px; display: none; z-index: 9999; border: 2px solid #00E5FF; }
        .ar-popup.show { display: block; }
    </style>
</head>

<body style="margin: 0px; overflow: hidden;">
    <div id="markerGuide" class="marker-guide"></div>
    <div id="arPopup" class="ar-popup">
        <div id="popupIcon" style="text-align:center; font-size:30px;"></div>
        <div id="popupTitle" style="text-align:center; color:#00E5FF; font-weight:bold;"></div>
        <div id="popupContent"></div>
    </div>

    <audio id="audioPlayer" preload="auto"></audio>

    <a-scene vr-mode-ui="enabled: false" embedded arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false; smooth: true; smoothCount: 10; smoothTolerance: 0.01; smoothThreshold: 5;">
        
        <a-nft type="nft" url="assets/marker/motherboard/motherboard" data-audio="assets/audio/motherboard.mp3">
            <a-entity gltf-model="assets/models/motherboard/scene.glb" scale="500 500 500"></a-entity>
        </a-nft>

        <a-entity camera></a-entity>
    </a-scene>

<script>
    const audioPlayer = document.getElementById('audioPlayer');
    const guide = document.getElementById('markerGuide');
    const popup = document.getElementById('arPopup');

    document.querySelectorAll('a-nft').forEach(marker => {
        marker.addEventListener('markerFound', () => {
            guide.classList.add('detected');
            popup.classList.add('show');
            
            // Audio Logic
            const audioSrc = marker.getAttribute('data-audio');
            audioPlayer.src = audioSrc;
            audioPlayer.play().catch(e => console.log("Audio menunggu interaksi user"));
        });

        marker.addEventListener('markerLost', () => {
            guide.classList.remove('detected');
            popup.classList.remove('show');
            audioPlayer.pause();
            audioPlayer.currentTime = 0;
        });
    });
</script>
</body>
</html>
