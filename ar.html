<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Media Pembelajaran AR - Perangkat Keras</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="assets/js/audio-manager.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body style="margin: 0px; overflow: hidden; font-family: 'Poppins', sans-serif; background-color: #0f172a;">

    <div class="arjs-loader" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; z-index: 999; display: flex; justify-content: center; align-items: center; color: white; font-size: 18px;">
        <div style="text-align: center;">
            <div style="width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid #22d3ee; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px;"></div>
            <div id="loader-text">Memuat Kamera AR...</div>
            <div style="font-size: 12px; color: #94a3b8; margin-top: 5px;">Mohon tunggu, sedang menyiapkan aset 3D.</div>
        </div>
    </div>

    <a href="index.html" id="back-to-menu" style="position: fixed; top: 20px; left: 20px; z-index: 100; display: flex; align-items: center; gap: 8px; padding: 12px 20px; background: rgba(15, 23, 42, 0.85); border: 2px solid rgba(34, 211, 238, 0.5); border-radius: 50px; text-decoration: none; color: white; font-size: 14px; font-weight: 600; backdrop-filter: blur(5px); transition: 0.3s; box-shadow: 0 4px 20px rgba(0,0,0,0.3);">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Menu Utama
    </a>

    <div class="marker-guide" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; height: 380px; border: 3px dashed rgba(34, 211, 238, 0.4); border-radius: 15px; pointer-events: none; z-index: 50; box-shadow: 0 0 0 9999px rgba(15, 23, 42, 0.35);">
        <div style="position: absolute; top: 15px; left: 0; width: 100%; text-align: center; font-size: 12px; font-weight: 600; color: #22d3ee; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">ARAHKAN KARTU NFT</div>
        <div style="position: absolute; bottom: 15px; left: 0; width: 100%; text-align: center; font-size: 11px; color: #cbd5e1; padding: 0 10px; text-shadow: 0 2px 4px rgba(0,0,0,0.5);">Posisikan kartu di dalam area kotak dashed ini</div>
    </div>

    <div id="zoom-controls" style="position: fixed; right: 20px; bottom: 180px; display: flex; flex-direction: column; gap: 10px; z-index: 100;">
        <button id="zoom-in" style="width: 45px; height: 45px; border-radius: 50%; background: rgba(15, 23, 42, 0.85); border: 2px solid rgba(34, 211, 238, 0.5); color: white; font-size: 20px; font-weight: bold; cursor: pointer; backdrop-filter: blur(5px); transition: 0.2s; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-family: 'Poppins', sans-serif;">+</button>
        <button id="zoom-out" style="width: 45px; height: 45px; border-radius: 50%; background: rgba(15, 23, 42, 0.85); border: 2px solid rgba(34, 211, 238, 0.5); color: white; font-size: 20px; font-weight: bold; cursor: pointer; backdrop-filter: blur(5px); transition: 0.2s; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-family: 'Poppins', sans-serif;">-</button>
    </div>

    <div id="arPopup" style="position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%) translateY(180px); width: 85%; max-width: 450px; background: rgba(15, 23, 42, 0.9); border: 2px solid #22d3ee; border-radius: 20px; padding: 20px; color: white; z-index: 100; transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275); backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
        <div style="display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(34, 211, 238, 0.2); padding-bottom: 12px; margin-bottom: 12px;">
            <div id="popupIcon" style="font-size: 28px; background: rgba(34, 211, 238, 0.1); width: 45px; height: 45px; display: flex; justify-content: center; align-items: center; border-radius: 12px;">🖥️</div>
            <div>
                <h2 id="popupTitle" style="margin: 0; font-size: 18px; font-weight: 700; color: #22d3ee; letter-spacing: 0.5px;">Nama Komponen</h2>
                <span style="font-size: 10px; color: #22d3ee; text-transform: uppercase; letter-spacing: 1px; font-weight: 600;">Perangkat Komputer</span>
            </div>
        </div>
        <p id="popupContent" style="margin: 0; font-size: 13.5px; line-height: 1.6; color: #cbd5e1; font-weight: 400;">Detail informasi komponen perangkat keras komputer akan muncul di sini setelah terdeteksi.</p>
    </div>

    <a-scene embedded vr-mode-ui="enabled: false;" renderer="logarithmicDepthBuffer: true; precision: medium;" arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;">
        
        <a-nft type="nft" url="assets/marker/motherboard/motherboard" data-component="motherboard">
            <a-entity class="ar-model" gltf-model="url(assets/model/motherboard.glb)" scale="15 15 15" position="0 0 0" rotation="-90 0 0"></a-entity>
        </a-nft>

        <a-nft type="nft" url="assets/marker/processor/processor" data-component="processor">
            <a-entity class="ar-model" gltf-model="url(assets/model/processor.glb)" scale="15 15 15" position="0 0 0" rotation="-90 0 0"></a-entity>
        </a-nft>

        <a-nft type="nft" url="assets/marker/harddisk/harddisk" data-component="harddisk">
            <a-entity class="ar-model" gltf-model="url(assets/model/harddisk.glb)" scale="15 15 15" position="0 0 0" rotation="-90 0 0"></a-entity>
        </a-nft>

        <a-nft type="nft" url="assets/marker/ram/ram" data-component="ram">
            <a-entity class="ar-model" gltf-model="url(assets/model/ram.glb)" scale="15 15 15" position="0 0 0" rotation="-90 0 0"></a-entity>
        </a-nft>

        <a-nft type="nft" url="assets/marker/gpu/gpu" data-component="gpu">
            <a-entity class="ar-model" gltf-model="url(assets/model/gpu.glb)" scale="15 15 15" position="0 0 0" rotation="-90 0 0"></a-entity>
        </a-nft>

        <a-nft type="nft" url="assets/marker/psu/psu" data-component="psu">
            <a-entity class="ar-model" gltf-model="url(assets/model/psu.glb)" scale="15 15 15" position="0 0 0" rotation="-90 0 0"></a-entity>
        </a-nft>

        <a-nft type="nft" url="assets/marker/monitor/monitor" data-component="monitor">
            <a-entity class="ar-model" gltf-model="url(assets/model/monitor.glb)" scale="15 15 15" position="0 0 0" rotation="-90 0 0"></a-entity>
        </a-nft>

        <a-nft type="nft" url="assets/marker/keyboard/keyboard" data-component="keyboard">
            <a-entity class="ar-model" gltf-model="url(assets/model/keyboard.glb)" scale="15 15 15" position="0 0 0" rotation="-90 0 0"></a-entity>
        </a-nft>

        <a-nft type="nft" url="assets/marker/mouse/mouse" data-component="mouse">
            <a-entity class="ar-model" gltf-model="url(assets/model/mouse.glb)" scale="15 15 15" position="0 0 0" rotation="-90 0 0"></a-entity>
        </a-nft>

        <a-nft type="nft" url="assets/marker/printer/printer" data-component="printer">
            <a-entity class="ar-model" gltf-model="url(assets/model/printer.glb)" scale="15 15 15" position="0 0 0" rotation="-90 0 0"></a-entity>
        </a-nft>

        <a-nft type="nft" url="assets/marker/speaker/speaker" data-component="speaker">
            <a-entity class="ar-model" gltf-model="url(assets/model/speaker.glb)" scale="15 15 15" position="0 0 0" rotation="-90 0 0"></a-entity>
        </a-nft>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const popupData = {
            motherboard: { icon: "📟", title: "Motherboard", desc: "Papan sirkuit utama yang menjadi tempat menancapnya berbagai komponen penting seperti processor, RAM, dan kartu grafis." },
            processor: { icon: "🔲", title: "Processor (CPU)", desc: "Otak utama komputer yang bertugas memproses data, mengendalikan sistem, dan mengeksekusi instruksi pengguna." },
            harddisk: { icon: "💾", title: "Harddisk (HDD)", desc: "Media penyimpanan sekunder magnetik berkapasitas besar untuk menyimpan sistem operasi, aplikasi, dan file pengguna secara permanen." },
            ram: { icon: "🎛️", title: "RAM", desc: "Random Access Memory berfungsi sebagai tempat penyimpanan data sementara yang sedang diakses secara aktif oleh CPU." },
            gpu: { icon: "🎮", title: "GPU / VGA Card", desc: "Kartu pengolah grafis khusus yang mengubah data digital sistem menjadi tampilan visual yang cemerlang di layar monitor." },
            psu: { icon: "⚡", title: "Power Supply Unit", desc: "Komponen vital yang mengubah arus listrik AC dinding menjadi arus DC yang stabil untuk didistribusikan ke komponen internal." },
            monitor: { icon: "🖥️", title: "Monitor", desc: "Perangkat output utama yang menyajikan antarmuka grafis hasil pemrosesan komputer agar dapat dilihat oleh mata manusia." },
            keyboard: { icon: "⌨️", title: "Keyboard", desc: "Papan ketik dengan susunan tombol untuk memasukkan karakter, angka, dan perintah kontrol navigasi ke dalam sistem." },
            mouse: { icon: "🖱️", title: "Mouse", desc: "Perangkat penunjuk genggam yang mendeteksi gerakan dua dimensi untuk memanipulasi kursor objek pada sistem operasi." },
            printer: { icon: "🖨️", title: "Printer", desc: "Perangkat periferal yang memindahkan berkas tulisan atau gambar digital dari komputer ke atas media fisik kertas cetak." },
            speaker: { icon: "🔊", title: "Speaker", desc: "Perangkat transduser output suara yang mengubah sinyal elektrik audio komputer menjadi getaran gelombang suara yang terdengar." }
        };

        const scene = document.querySelector("a-scene");
        const loader = document.querySelector(".arjs-loader");
        const loaderText = document.getElementById("loader-text");
        const arPopup = document.getElementById("arPopup");
        const popupIcon = document.getElementById("popupIcon");
        const popupTitle = document.getElementById("popupTitle");
        const popupContent = document.getElementById("popupContent");
        const allMarkers = document.querySelectorAll("a-nft");

        // Pemutus paksa loader jika browser lag memuat NFT (3 detik)
        setTimeout(() => {
            if(loader && loader.style.display !== "none") {
                loader.style.display = "none";
            }
        }, 3000);

        scene.addEventListener("camera-init", () => {
            if(loader) loader.style.display = "none";
        });

        scene.addEventListener("camera-error", (err) => {
            console.error(err);
            if(loaderText) {
                loaderText.innerHTML = `<span style="color:#ef4444">Kamera gagal dibuka</span><br><small>Pastikan browser telah diberi izin kamera.</small>`;
            }
        });

        let activeMarker = "";

        allMarkers.forEach(marker => {
            const compName = marker.dataset.component;

            marker.addEventListener("markerFound", () => {
                if (activeMarker === compName) return;
                activeMarker = compName;

                const info = popupData[compName];
                if (info) {
                    popupIcon.innerHTML = info.icon;
                    popupTitle.innerHTML = info.title;
                    popupContent.innerHTML = info.desc;
                    arPopup.style.transform = "translateX(-50%) translateY(0)";
                }

                if (typeof audioManager !== 'undefined' && typeof audioManager.playAudio === 'function') {
                    audioManager.playAudio(compName);
                }
            });

            marker.addEventListener("markerLost", () => {
                if (activeMarker !== compName) return;
                activeMarker = "";
                arPopup.style.transform = "translateX(-50%) translateY(180px)";

                if (typeof audioManager !== 'undefined' && typeof audioManager.stopAudio === 'function') {
                    audioManager.stopAudio(compName);
                }
            });
        });

        // Kontrol Zoom Asli Kamu (Diperbaiki Selektor Atributnya)
        let currentScaleFactor = 1.0;
        document.getElementById("zoom-in").addEventListener("click", () => {
            if (currentScaleFactor < 3.0) {
                currentScaleFactor += 0.2;
                updateModelsScale();
            }
        });

        document.getElementById("zoom-out").addEventListener("click", () => {
            if (currentScaleFactor > 0.4) {
                currentScaleFactor -= 0.2;
                updateModelsScale();
            }
        });

        function updateModelsScale() {
            document.querySelectorAll(".ar-model").forEach(model => {
                const originalBaseScale = 15;
                const newScaleValue = originalBaseScale * currentScaleFactor;
                model.setAttribute("scale", `${newScaleValue} ${newScaleValue} ${newScaleValue}`);
            });
        }

        // Pembersihan Aliran Kamera Saat Keluar Menu
        document.getElementById('back-to-menu').addEventListener('click', (e) => {
            e.preventDefault();
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({video: true}).then(stream => {
                    stream.getTracks().forEach(track => track.stop());
                }).catch(err => console.log(err));
            }
            window.location.href = 'index.html';
        });
    </script>

    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #zoom-controls button:active {
            background: #22d3ee !important;
            color: #0f172a !important;
            transform: scale(0.95);
        }
        #back-to-menu:hover {
            background: #22d3ee !important;
            color: #0f172a !important;
            border-color: #22d3ee !important;
        }
    </style>
</body>
</html>
