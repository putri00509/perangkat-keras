<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Media Pembelajaran AR - Perangkat Keras</title>
    
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="assets/js/audio-manager.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body style="margin: 0px; overflow: hidden; font-family: 'Poppins', sans-serif; background-color: #0f172a;">

    <div class="arjs-loader" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0f172a; z-index: 999; display: flex; justify-content: center; align-items: center; color: white; font-size: 18px;">
        <div style="text-align: center;">
            <div style="width: 50px; height: 50px; border: 5px solid #1e293b; border-top: 5px solid #22d3ee; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px;"></div>
            <div id="loader-text">Memuat Aset 3D & Data Marker...</div>
        </div>
    </div>

    <a href="index.html" id="back-to-menu" style="position: fixed; top: 20px; left: 20px; z-index: 100; text-decoration: none; background: rgba(15, 23, 42, 0.8); padding: 12px 20px; border-radius: 50px; color: white; font-weight: 600; font-size: 14px; border: 2px solid rgba(34, 211, 238, 0.5); display: flex; align-items: center; gap: 8px; backdrop-filter: blur(5px); box-shadow: 0 4px 20px rgba(0,0,0,0.3); transition: all 0.3s;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Menu Utama
    </a>

    <div class="marker-guide" style="position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; height: 380px; border: 3px dashed rgba(34, 211, 238, 0.4); border-radius: 15px; z-index: 50; pointer-events: none; transition: all 0.3s ease;">
        <div style="position: absolute; top: 15px; left: 0; width: 100%; text-align: center; color: rgba(34, 211, 238, 0.8); font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px;">
            Arahkan ke Kartu
        </div>
    </div>

    <div id="zoom-controls" style="position: fixed; bottom: 180px; right: 20px; z-index: 100; display: flex; flex-direction: column; gap: 10px;">
        <button id="zoom-in" style="width: 45px; height: 45px; border-radius: 50%; border: 2px solid rgba(34, 211, 238, 0.5); background: rgba(15, 23, 42, 0.8); color: white; font-size: 20px; font-weight: bold; cursor: pointer; backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: center;">+</button>
        <button id="zoom-out" style="width: 45px; height: 45px; border-radius: 50%; border: 2px solid rgba(34, 211, 238, 0.5); background: rgba(15, 23, 42, 0.8); color: white; font-size: 20px; font-weight: bold; cursor: pointer; backdrop-filter: blur(5px); display: flex; justify-content: center; align-items: center;">-</button>
    </div>

    <div id="arPopup" class="ar-popup" style="position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%) translateY(150px); width: 85%; max-width: 450px; background: rgba(15, 23, 42, 0.9); border: 2px solid #22d3ee; border-radius: 20px; padding: 20px; color: white; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.5); backdrop-filter: blur(10px); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; flex-direction: column; gap: 8px;">
        <div style="display: flex; align-items: center; gap: 12px; border-bottom: 1px solid rgba(34, 211, 238, 0.2); padding-bottom: 8px;">
            <div id="popupIcon" style="font-size: 24px; color: #22d3ee;">🖥️</div>
            <h2 id="popupTitle" style="margin: 0; font-size: 18px; font-weight: 700; color: #22d3ee; letter-spacing: 0.5px;">Nama Komponen</h2>
        </div>
        <p id="popupContent" style="margin: 5px 0 0; font-size: 13px; line-height: 1.6; color: #94a3b8; font-weight: 500;">Deskripsi perangkat keras akan muncul di sini secara dinamis setelah kartu berhasil dipindai oleh kamera.</p>
    </div>

    <a-scene 
        vr-mode-ui="enabled: false;"
        renderer="antialias: false; precision: low; powerPreference: high-performance;"
        embedded 
        arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;">

        <a-entity camera id="mainCamera"></a-entity>

        <a-nft type="nft" url="assets/marker/motherboard/motherboard" data-component="motherboard" smooth="true" smoothCount="10" smoothTolerance=".01" smoothThreshold="5">
            <a-entity class="ar-model" gltf-model="assets/model/motherboard.gltf" scale="15 15 15" position="0 0 -50" rotation="-90 0 0"></a-entity>
        </a-nft>

        <a-nft type="nft" url="assets/marker/processor/processor" data-component="processor" smooth="true" smoothCount="10" smoothTolerance=".01" smoothThreshold="5">
            <a-entity class="ar-model" gltf-model="assets/model/processor.gltf" scale="15 15 15" position="0 0 -50" rotation="-90 0 0"></a-entity>
        </a-nft>

        <a-nft type="nft" url="assets/marker/harddisk/harddisk" data-component="harddisk" smooth="true" smoothCount="10" smoothTolerance=".01" smoothThreshold="5">
            <a-entity class="ar-model" gltf-model="assets/model/harddisk.gltf" scale="15 15 15" position="0 0 -50" rotation="-90 0 0"></a-entity>
        </a-nft>

        <a-nft type="nft" url="assets/marker/ram/ram" data-component="ram" smooth="true" smoothCount="10" smoothTolerance=".01" smoothThreshold="5">
            <a-entity class="ar-model" gltf-model="assets/model/ram.gltf" scale="15 15 15" position="0 0 -50" rotation="-90 0 0"></a-entity>
        </a-nft>

        <a-nft type="nft" url="assets/marker/gpu/gpu" data-component="gpu" smooth="true" smoothCount="10" smoothTolerance=".01" smoothThreshold="5">
            <a-entity class="ar-model" gltf-model="assets/model/gpu.gltf" scale="15 15 15" position="0 0 -50" rotation="-90 0 0"></a-entity>
        </a-nft>

        <a-nft type="nft" url="assets/marker/psu/psu" data-component="psu" smooth="true" smoothCount="10" smoothTolerance=".01" smoothThreshold="5">
            <a-entity class="ar-model" gltf-model="assets/model/psu.gltf" scale="15 15 15" position="0 0 -50" rotation="-90 0 0"></a-entity>
        </a-nft>

        <a-nft type="nft" url="assets/marker/monitor/monitor" data-component="monitor" smooth="true" smoothCount="10" smoothTolerance=".01" smoothThreshold="5">
            <a-entity class="ar-model" gltf-model="assets/model/monitor.gltf" scale="15 15 15" position="0 0 -50" rotation="-90 0 0"></a-entity>
        </a-nft>

        <a-nft type="nft" url="assets/marker/keyboard/keyboard" data-component="keyboard" smooth="true" smoothCount="10" smoothTolerance=".01" smoothThreshold="5">
            <a-entity class="ar-model" gltf-model="assets/model/keyboard.gltf" scale="15 15 15" position="0 0 -50" rotation="-90 0 0"></a-entity>
        </a-nft>

        <a-nft type="nft" url="assets/marker/mouse/mouse" data-component="mouse" smooth="true" smoothCount="10" smoothTolerance=".01" smoothThreshold="5">
            <a-entity class="ar-model" gltf-model="assets/model/mouse.gltf" scale="15 15 15" position="0 0 -50" rotation="-90 0 0"></a-entity>
        </a-nft>

        <a-nft type="nft" url="assets/marker/printer/printer" data-component="printer" smooth="true" smoothCount="10" smoothTolerance=".01" smoothThreshold="5">
            <a-entity class="ar-model" gltf-model="assets/model/printer.gltf" scale="15 15 15" position="0 0 -50" rotation="-90 0 0"></a-entity>
        </a-nft>

        <a-nft type="nft" url="assets/marker/speaker/speaker" data-component="speaker" smooth="true" smoothCount="10" smoothTolerance=".01" smoothThreshold="5">
            <a-entity class="ar-model" gltf-model="assets/model/speaker.gltf" scale="15 15 15" position="0 0 -50" rotation="-90 0 0"></a-entity>
        </a-nft>

    </a-scene>

    <script>
        // Data Bank Teks Materi Belajar untuk Popup Info
        const popupData = {
            motherboard: { icon: "🔌", title: "Motherboard", desc: "Papan sirkuit utama yang menjadi tempat menancapnya semua komponen penting komputer seperti RAM, CPU, dan VGA." },
            processor: { icon: "🧠", title: "Processor (CPU)", desc: "Otak utama komputer yang berfungsi mengendalikan seluruh jalannya data sistem serta mengeksekusi perintah kerja." },
            harddisk: { icon: "🗄️", title: "Harddisk / SSD", desc: "Tempat penyimpanan permanen utama komputer untuk menyimpan sistem operasi, aplikasi, dokumen, dan data pengguna." },
            ram: { icon: "⚡", title: "RAM (Random Access Memory)", desc: "Tempat penyimpanan data sementara berkecepatan tinggi yang digunakan CPU saat program sedang dijalankan." },
            gpu: { icon: "🎮", title: "VGA Card (GPU)", desc: "Perangkat keras khusus yang bertugas mengolah data grafis dan visual agar bisa ditampilkan ke layar monitor secara lancar." },
            psu: { icon: "🔋", title: "Power Supply Unit (PSU)", desc: "Komponen pemompa daya listrik utama yang mengubah arus AC rumahan menjadi DC untuk dialirkan ke seluruh bagian komputer." },
            monitor: { icon: "🖥️", title: "Monitor", desc: "Perangkat output utama yang bertugas memvisualisasikan data grafis kiriman VGA menjadi tampilan gambar di layar." },
            keyboard: { icon: "⌨️", title: "Keyboard", desc: "Perangkat input papan ketik untuk memasukkan karakter tulisan, instruksi pintasan, dan angka ke sistem." },
            mouse: { icon: "🖱️", title: "Mouse", desc: "Perangkat input penunjuk posisi kursor guna mempermudah pemilihan opsi objek di dalam layar monitor." },
            printer: { icon: "🖨️", title: "Printer", desc: "Alat output fisik untuk mencetak dokumen digital atau gambar ke media kertas secara nyata." },
            speaker: { icon: "🔊", title: "Speaker", desc: "Alat pemroses gelombang frekuensi audio untuk menghasilkan suara keluaran komputer." }
        };

        // --- A. MEMAKSA BROWSER MEMINTA IZIN USER MEDIA WEBCAM SECARA EKSPLISIT ---
        window.addEventListener('load', () => {
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                .then((stream) => {
                    console.log("Akses modul hardware kamera diizinkan oleh sistem.");
                })
                .catch((err) => {
                    console.error("Modul kamera gagal terbuka:", err);
                    const textLoader = document.getElementById('loader-text');
                    if (textLoader) {
                        textLoader.innerHTML = "<span style='color:#ef4444; font-weight:bold;'>Kamera Diblokir Browser!</span><br><small>Mohon buka ikon gembok di URL atas dan ubah ke 'Izinkan/Allow Camera' lalu muat ulang halaman.</small>";
                    }
                });
            }
        });

        // --- B. DETEKSI LOGIKA AR.js ENGINE READY ---
        window.addEventListener('arjs-nft-loaded', () => {
            console.log("Semua target berkas pelacak NFT selesai diolah!");
            const loader = document.querySelector('.arjs-loader');
            if (loader) loader.style.display = 'none';
        });

        // --- C. INTEGRASI SUARA DAN POPUP PADA SEMUA MARKER ---
        const allMarkers = document.querySelectorAll('a-nft');
        allMarkers.forEach(marker => {
            const compName = marker.getAttribute('data-component');

            // Inisialisasi Audio Manajer Instan (Path Otomatis)
            if (typeof audioManager !== 'undefined') {
                audioManager.initAudio(compName, `assets/audio/${compName}.mp3`);
            }

            // Saat Kamera Menemukan Kartu Target
            marker.addEventListener('markerFound', () => {
                const guide = document.querySelector(".marker-guide");
                guide.style.borderColor = "#22c55e";
                guide.style.boxShadow = "0 0 20px rgba(34, 211, 238, 0.6)";

                // Bunyikan Audio Penjelasan
                if (typeof audioManager !== 'undefined') {
                    audioManager.playAudio(compName);
                }

                // Tampilkan Popup Info Hardware
                const info = popupData[compName];
                if (info) {
                    document.getElementById('popupIcon').innerHTML = info.icon;
                    document.getElementById('popupTitle').innerHTML = info.title;
                    document.getElementById('popupContent').innerHTML = info.desc;
                    document.getElementById('arPopup').style.transform = "translateX(-50%) translateY(0px)";
                }
            });

            // Saat Kamera Kehilangan Kartu Target
            marker.addEventListener('markerLost', () => {
                const guide = document.querySelector(".marker-guide");
                guide.style.borderColor = "rgba(34, 211, 238, 0.4)";
                guide.style.boxShadow = "none";

                // Matikan Audio Penjelasan
                if (typeof audioManager !== 'undefined') {
                    audioManager.stopAudio(compName);
                }

                // Sembunyikan Kembali Popup Info Hardware
                document.getElementById('arPopup').style.transform = "translateX(-50%) translateY(150px)";
            });
        });

        // --- D. LOGIKA KONTROL ZOOM MODEL 3D INTERAKTIF ---
        let currentScaleFactor = 1.0;
        const models = document.querySelectorAll('.ar-model');

        document.getElementById('zoom-in').addEventListener('click', () => {
            if (currentScaleFactor < 2.5) {
                currentScaleFactor += 0.2;
                updateModelsScale();
            }
        });

        document.getElementById('zoom-out').addEventListener('click', () => {
            if (currentScaleFactor > 0.4) {
                currentScaleFactor -= 0.2;
                updateModelsScale();
            }
        });

        function updateModelsScale() {
            models.forEach(model => {
                const originalBaseScale = 15; // Berdasarkan skala bawaan 15 15 15
                const newScaleValue = originalBaseScale * currentScaleFactor;
                model.setAttribute('scale', `${newScaleValue} ${newScaleValue} ${newScaleValue}`);
            });
            console.log("Skala model AR berhasil diubah ke faktor: " + currentScaleFactor);
        }

        // --- E. BERSIHKAN ALIRAN WEBCAM SAAT TOMBOL MENU DIKLIK ---
        document.getElementById('back-to-menu').addEventListener('click', (e) => {
            e.preventDefault();
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({video: true}).then(stream => {
                    stream.getTracks().forEach(track => track.stop());
                }).catch(err => console.log(err));
            }
            window.location.href = 'index.html';
        });
    </script>

    <style>
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #zoom-controls button:active {
            background: #22d3ee !important;
            color: #0f172a !important;
            transform: scale(0.95);
        }
        #back-to-menu:hover {
            background: #22d3ee !important;
            color: #0f172a !important;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.6);
        }
    </style>
</body>
</html>
