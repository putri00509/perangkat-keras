<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Media Pembelajaran AR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        .ui-overlay { position: absolute; top:0; left:0; width:100%; height:100%; display:flex; justify-content:center; align-items:center; background:rgba(0,0,0,0.8); z-index:9999; }
        .start-btn { padding: 20px 40px; font-size: 18px; cursor: pointer; background: #00E5FF; border: none; border-radius: 30px; font-weight: bold; }
        
        /* KOTAK GUIDE AREA SCAN */
        .marker-guide {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 300px; height: 300px; border: 5px dashed #00E5FF;
            border-radius: 25px; z-index: 9998; pointer-events: none;
            background: rgba(255,255,255,.05); box-shadow: 0 0 20px rgba(0,229,255,0.5);
        }
        .marker-guide.detected { border-color: #22c55e; box-shadow: 0 0 20px #22c55e; }
        
        .ar-popup { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 350px; background: rgba(0,0,0,0.9); color: white; padding: 20px; border-radius: 20px; display: none; z-index: 9999; border: 2px solid #00E5FF; }
        .ar-popup.show { display: block; }
    </style>
</head>
<body>

    <div id="ui" class="ui-overlay"><button class="start-btn" onclick="startAR()">MULAI MEDIA AR</button></div>
    
    <div id="markerGuide" class="marker-guide"></div>
    <div id="arPopup" class="ar-popup"><div id="popupIcon" style="font-size:30px; text-align:center;"></div><h3 id="popupTitle" style="text-align:center; color:#00E5FF;"></h3><p id="popupContent"></p></div>
    <audio id="audioPlayer"></audio>

    <a-scene vr-mode-ui="enabled: false" embedded arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false; smooth: true; smoothCount: 15; smoothTolerance: 0.01; smoothThreshold: 5;">
        
        <a-nft type="nft" url="assets/marker/motherboard/motherboard" data-comp="motherboard" data-audio="assets/audio/motherboard.mp3"><a-entity gltf-model="assets/models/motherboard/scene.glb" scale="500 500 500" look-at="[camera]"></a-entity></a-nft>
        <a-nft type="nft" url="assets/marker/speaker/speaker" data-comp="speaker" data-audio="assets/audio/speaker.mp3"><a-entity gltf-model="assets/models/speaker/scene.glb" scale="150 150 150" look-at="[camera]"></a-entity></a-nft>
        <a-nft type="nft" url="assets/marker/gpu/gpu" data-comp="gpu" data-audio="assets/audio/gpu.mp3"><a-entity gltf-model="assets/models/gpu/scene.glb" scale="0.1 0.1 0.1" look-at="[camera]"></a-entity></a-nft>
        <a-nft type="nft" url="assets/marker/hardisk/hardisk" data-comp="hardisk" data-audio="assets/audio/hardisk.mp3"><a-entity gltf-model="assets/models/hardisk/scene.glb" scale="500 500 500" look-at="[camera]"></a-entity></a-nft>
        <a-nft type="nft" url="assets/marker/ram/ram" data-comp="ram" data-audio="assets/audio/ram.mp3"><a-entity gltf-model="assets/models/ram/scene.glb" scale="10 10 10" look-at="[camera]"></a-entity></a-nft>
        <a-nft type="nft" url="assets/marker/psu/psu" data-comp="psu" data-audio="assets/audio/psu.mp3"><a-entity gltf-model="assets/models/psu/scene.glb" scale="2 2 2" look-at="[camera]"></a-entity></a-nft>
        <a-nft type="nft" url="assets/marker/procesor/procesor" data-comp="procesor" data-audio="assets/audio/procesor.mp3"><a-entity gltf-model="assets/models/procesor/scene.glb" scale="0.1 0.1 0.1" look-at="[camera]"></a-entity></a-nft>
        <a-nft type="nft" url="assets/marker/monitor/monitor" data-comp="monitor" data-audio="assets/audio/monitor.mp3"><a-entity gltf-model="assets/models/monitor/scene.glb" scale="50 50 50" look-at="[camera]"></a-entity></a-nft>
        <a-nft type="nft" url="assets/marker/mouse/mouse" data-comp="mouse" data-audio="assets/audio/mouse.mp3"><a-entity gltf-model="assets/models/mouse/scene.glb" scale="20 20 20" look-at="[camera]"></a-entity></a-nft>
        <a-nft type="nft" url="assets/marker/printer/printer" data-comp="printer" data-audio="assets/audio/printer.mp3"><a-entity gltf-model="assets/models/printer/scene.glb" scale="5 5 5" look-at="[camera]"></a-entity></a-nft>
        <a-nft type="nft" url="assets/marker/keyboard/keyboard" data-comp="keyboard" data-audio="assets/audio/keyboard.mp3"><a-entity gltf-model="assets/models/keyboard/scene.glb" scale="10 10 10" look-at="[camera]"></a-entity></a-nft>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const popupData = {
            motherboard: { icon: "🔌", title: "Motherboard", desc: "Pusat penghubung semua komponen." },
            speaker: { icon: "🔊", title: "Speaker", desc: "Perangkat pengolah suara." },
            gpu: { icon: "🎮", title: "GPU", desc: "Pengolah grafis komputer." },
            hardisk: { icon: "💾", title: "Harddisk", desc: "Penyimpanan data permanen." },
            ram: { icon: "⚡", title: "RAM", desc: "Memori penyimpanan sementara." },
            psu: { icon: "🔋", title: "Power Supply", desc: "Penyuplai daya listrik." },
            procesor: { icon: "🧠", title: "Processor", desc: "Otak utama komputer." },
            monitor: { icon: "🖥️", title: "Monitor", desc: "Layar output visual." },
            mouse: { icon: "🖱️", title: "Mouse", desc: "Alat penunjuk kursor." },
            printer: { icon: "🖨️", title: "Printer", desc: "Pencetak dokumen." },
            keyboard: { icon: "⌨️", title: "Keyboard", desc: "Input teks dan perintah." }
        };

        function startAR() { document.getElementById('ui').style.display = 'none'; }

        document.querySelectorAll('a-nft').forEach(marker => {
            const comp = marker.getAttribute('data-comp');
            marker.addEventListener('markerFound', () => {
                document.getElementById('markerGuide').classList.add('detected');
                document.getElementById('arPopup').classList.add('show');
                document.getElementById('popupIcon').innerText = popupData[comp].icon;
                document.getElementById('popupTitle').innerText = popupData[comp].title;
                document.getElementById('popupContent').innerText = popupData[comp].desc;
                const audio = document.getElementById('audioPlayer');
                audio.src = marker.getAttribute('data-audio');
                audio.play();
            });
            marker.addEventListener('markerLost', () => {
                document.getElementById('markerGuide').classList.remove('detected');
                document.getElementById('arPopup').classList.remove('show');
                document.getElementById('audioPlayer').pause();
            });
        });
    </script>
</body>
</html>
