<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Media Pembelajaran AR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="assets/js/aframe-ar-nft.js"></script>
    <script src="assets/js/audio-manager.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body style="margin: 0px; overflow: hidden;">
    <div class="arjs-loader"><div>Loading, silakan tunggu...</div></div>
    <div id="markerGuide" class="marker-guide"></div>

    <div id="arPopup" class="ar-popup">
        <div id="popupIcon"></div>
        <div id="popupTitle"></div>
        <div id="popupContent"></div>
    </div>

    <a-scene vr-mode-ui="enabled: false;" renderer="logarithmicDepthBuffer: true; precision: medium;" 
             embedded arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false; smooth: true; smoothCount: 10; smoothTolerance: 0.01; smoothThreshold: 5;">
        
        <a-nft type="nft" url="assets/marker/motherboard/motherboard" data-component="motherboard" data-audio="assets/audio/motherboard.mp3"><a-entity gltf-model="assets/models/motherboard/scene.glb" scale="500 500 500" look-at="[camera]"></a-entity></a-nft>
        <a-nft type="nft" url="assets/marker/speaker/speaker" data-component="speaker" data-audio="assets/audio/speaker.mp3"><a-entity gltf-model="assets/models/speaker/scene.glb" scale="150 150 150" look-at="[camera]"></a-entity></a-nft>
        <a-nft type="nft" url="assets/marker/gpu/gpu" data-component="gpu" data-audio="assets/audio/gpu.mp3"><a-entity gltf-model="assets/models/gpu/scene.glb" scale="0.1 0.1 0.1" look-at="[camera]"></a-entity></a-nft>
        <a-nft type="nft" url="assets/marker/hardisk/hardisk" data-component="hardisk" data-audio="assets/audio/hardisk.mp3"><a-entity gltf-model="assets/models/hardisk/scene.glb" scale="500 500 500" look-at="[camera]"></a-entity></a-nft>
        <a-nft type="nft" url="assets/marker/ram/ram" data-component="ram" data-audio="assets/audio/ram.mp3"><a-entity gltf-model="assets/models/ram/scene.glb" scale="10 10 10" look-at="[camera]"></a-entity></a-nft>
        <a-nft type="nft" url="assets/marker/psu/psu" data-component="psu" data-audio="assets/audio/psu.mp3"><a-entity gltf-model="assets/models/psu/scene.glb" scale="2 2 2" look-at="[camera]"></a-entity></a-nft>
        <a-nft type="nft" url="assets/marker/procesor/procesor" data-component="procesor" data-audio="assets/audio/procesor.mp3"><a-entity gltf-model="assets/models/procesor/scene.glb" scale="0.1 0.1 0.1" look-at="[camera]"></a-entity></a-nft>
        <a-nft type="nft" url="assets/marker/monitor/monitor" data-component="monitor" data-audio="assets/audio/monitor.mp3"><a-entity gltf-model="assets/models/monitor/scene.glb" scale="50 50 50" look-at="[camera]"></a-entity></a-nft>
        <a-nft type="nft" url="assets/marker/mouse/mouse" data-component="mouse" data-audio="assets/audio/mouse.mp3"><a-entity gltf-model="assets/models/mouse/scene.glb" scale="20 20 20" look-at="[camera]"></a-entity></a-nft>
        <a-nft type="nft" url="assets/marker/printer/printer" data-component="printer" data-audio="assets/audio/printer.mp3"><a-entity gltf-model="assets/models/printer/scene.glb" scale="5 5 5" look-at="[camera]"></a-entity></a-nft>
        <a-nft type="nft" url="assets/marker/keyboard/keyboard" data-component="keyboard" data-audio="assets/audio/keyboard.mp3"><a-entity gltf-model="assets/models/keyboard/scene.glb" scale="10 10 10" look-at="[camera]"></a-entity></a-nft>

        <a-entity camera></a-entity>
    </a-scene>

<script>
    const popupData = {
        motherboard: { icon: "🔌", title: "Motherboard", desc: "Pusat penghubung semua komponen." },
        speaker: { icon: "🔊", title: "Speaker", desc: "Perangkat pengolah suara." },
        gpu: { icon: "🎮", title: "GPU", desc: "Pengolah grafis komputer." },
        hardisk: { icon: "💾", title: "Harddisk", desc: "Penyimpanan data permanen." },
        ram: { icon: "⚡", title: "RAM", desc: "Memori penyimpanan sementara." },
        psu: { icon: "🔋", title: "Power Supply", desc: "Penyuplai daya listrik." },
        procesor: { icon: "🧠", title: "Processor", desc: "Otak utama komputer." },
        monitor: { icon: "🖥️", title: "Monitor", desc: "Layar output visual." },
        mouse: { icon: "🖱️", title: "Mouse", desc: "Alat penunjuk kursor." },
        printer: { icon: "🖨️", title: "Printer", desc: "Pencetak dokumen." },
        keyboard: { icon: "⌨️", title: "Keyboard", desc: "Input teks dan perintah." }
    };

    window.addEventListener('load', () => {
        const guide = document.getElementById('markerGuide');
        const popup = document.getElementById('arPopup');
        let hideTimeout = null;

        document.querySelectorAll('a-nft').forEach(marker => {
            const component = marker.getAttribute('data-component');
            const entity = marker.querySelector('a-entity');
            
            marker.addEventListener('markerFound', () => {
                clearTimeout(hideTimeout);
                guide.classList.add('detected');
                entity.setAttribute('visible', 'true');
                if (typeof audioManager !== 'undefined') audioManager.playAudio(component);
                
                const data = popupData[component];
                if (data) {
                    document.getElementById('popupIcon').innerText = data.icon;
                    document.getElementById('popupTitle').innerText = data.title;
                    document.getElementById('popupContent').innerText = data.desc;
                    popup.classList.add('show');
                }
            });

            marker.addEventListener('markerLost', () => {
                hideTimeout = setTimeout(() => {
                    guide.classList.remove('detected');
                    entity.setAttribute('visible', 'false');
                    if (typeof audioManager !== 'undefined') audioManager.stopAudio(component);
                    popup.classList.remove('show');
                }, 500);
            });
        });
    });
</script>
</body>
</html>
